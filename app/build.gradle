plugins {
    id 'com.android.application'
}

android {
    namespace 'app.sleep.durationalarm'
    compileSdk 35

    defaultConfig {
        applicationId 'app.sleep.durationalarm'
        minSdk 31
        targetSdk 35
        versionCode 6
        versionName '1.2.0'
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.debug
        }
    }

    lint {
        checkReleaseBuilds false
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    compileOnly project(':xposed-api-stub')
}
